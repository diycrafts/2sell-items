<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — CraftEarth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .shop-hero {
      padding: 140px 5% 60px;
      background: linear-gradient(135deg, var(--sand) 0%, var(--cream) 100%);
      text-align: center;
    }
    .shop-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 5vw, 56px);
      color: var(--dark);
      margin-bottom: 12px;
    }
    .shop-hero p { color: var(--text-m); font-size: 17px; }

    .filter-bar {
      display: flex;
      gap: 12px;
      padding: 32px 5%;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--sand-d);
    }
    .filter-btn {
      padding: 9px 20px;
      border-radius: 50px;
      border: 1.5px solid var(--stone-l);
      background: transparent;
      color: var(--text-m);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--earth);
      color: var(--white);
      border-color: var(--earth);
    }

    .shop-section {
      padding: 60px 5% 100px;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">CraftEarth</a>
    <ul class="nav-links">
      <li><a href="category.html">Shop</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <a href="category.html" class="btn-nav">Shop Now</a>
  </nav>

  <div class="shop-hero">
    <span class="hero-tag">All Products</span>
    <h1>Our Collection</h1>
    <p>Handpicked for makers, builders &amp; decorators.</p>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
    <button class="filter-btn" onclick="filterProducts('Concrete & Cement', this)">Concrete &amp; Cement</button>
    <button class="filter-btn" onclick="filterProducts('Outdoor & Yard', this)">Outdoor &amp; Yard</button>
    <button class="filter-btn" onclick="filterProducts('Home Decor', this)">Home Decor</button>
    <button class="filter-btn" onclick="filterProducts('DIY Tools', this)">DIY Tools</button>
    <button class="filter-btn" onclick="filterProducts('Kits & Bundles', this)">Kits &amp; Bundles</button>
  </div>

  <section class="shop-section">
    <div class="product-grid" id="product-grid"></div>
  </section>

  <div class="toast" id="toast">Added to cart!</div>

  <script src="js/main.js"></script>
  <script>
    function filterProducts(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const grid = document.getElementById('product-grid');
      const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
      grid.innerHTML = filtered.map(p => `
        <div class="product-card" onclick="viewProduct(${p.id})">
          <div class="product-img">${p.emoji}</div>
          <div class="product-body">
            ${p.tag ? `<span class="product-cat">${p.tag}</span>` : `<span class="product-cat">${p.category}</span>`}
            <div class="product-name">${p.name}</div>
            <div class="product-footer">
              <span class="product-price">$${p.price.toFixed(2)}</span>
              <button class="add-to-cart" onclick="addToCart(event, ${p.id})">+</button>
            </div>
          </div>
        </div>
      `).join('') || '<p style="color:var(--text-m); padding:40px 0">No products in this category yet.</p>';
    }
  </script>
</body>
</html>
