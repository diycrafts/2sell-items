<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — CraftEarth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://js.stripe.com/v3/"></script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .product-page { padding: 120px 5% 80px; max-width: 1100px; margin: 0 auto; }
    .breadcrumb { font-size: 13px; color: var(--stone); margin-bottom: 32px; }
    .breadcrumb a { color: var(--earth); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }

    /* GALLERY */
    .gallery { position: sticky; top: 100px; }
    .gallery-main {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      background: var(--sand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      margin-bottom: 14px;
      overflow: hidden;
      cursor: zoom-in;
    }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
    .gallery-main .emoji-placeholder { font-size: 100px; }
    .gallery-thumbs { display: flex; gap: 10px; }
    .gallery-thumb {
      width: 80px; height: 80px;
      border-radius: 10px;
      background: var(--sand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
      overflow: hidden;
      flex-shrink: 0;
    }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumb.active { border-color: var(--earth); }

    /* PRODUCT INFO */
    .product-info { padding-top: 8px; }
    .product-info .product-cat { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--moss); font-weight: 500; margin-bottom: 10px; display: block; }
    .product-info h1 { font-family: 'Playfair Display', serif; font-size: clamp(24px,3vw,36px); color: var(--dark); margin-bottom: 12px; line-height: 1.2; }
    .product-info .rating { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-m); margin-bottom: 20px; }
    .stars { color: #c8962e; }
    .price-block { margin-bottom: 24px; }
    .price-main { font-size: 32px; font-weight: 500; color: var(--earth-d); }
    .shipping-info { font-size: 14px; color: var(--text-m); margin-top: 6px; line-height: 1.6; }
    .shipping-info strong { color: var(--moss); }

    .divider { border: none; border-top: 1px solid var(--sand-d); margin: 24px 0; }

    .product-desc { font-size: 16px; color: var(--text-m); line-height: 1.8; margin-bottom: 24px; }

    .product-details-list { list-style: none; margin-bottom: 28px; }
    .product-details-list li {
      font-size: 14px;
      color: var(--text-m);
      padding: 8px 0;
      border-bottom: 1px solid var(--sand-d);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.5;
    }
    .product-details-list li::before { content: '—'; color: var(--stone-l); flex-shrink: 0; }

    .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .qty-label { font-size: 14px; color: var(--text-m); }
    .qty-control { display: flex; align-items: center; gap: 0; border: 1.5px solid var(--stone-l); border-radius: 50px; overflow: hidden; }
    .qty-control button {
      background: none;
      border: none;
      width: 40px; height: 40px;
      font-size: 18px;
      cursor: pointer;
      color: var(--earth);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .qty-control button:hover { background: var(--sand); }
    .qty-control span { width: 36px; text-align: center; font-size: 15px; font-weight: 500; }

    .add-btn { width: 100%; padding: 16px; font-size: 16px; border-radius: 50px; margin-bottom: 12px; text-align: center; }
    .buy-btn { width: 100%; padding: 16px; font-size: 16px; border-radius: 50px; text-align: center; background: var(--dark); color: var(--cream); border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: background 0.2s; }
    .buy-btn:hover { background: #3D3020; }

    .trust-badges { display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
    .trust-badge { font-size: 12px; color: var(--stone); display: flex; align-items: center; gap: 5px; }

    @media (max-width: 768px) {
      .product-layout { grid-template-columns: 1fr; gap: 32px; }
      .gallery { position: static; }
      .gallery-main { aspect-ratio: 4/3; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">CraftEarth</a>
    <ul class="nav-links">
      <li><a href="index.html#products">Shop</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="cart-btn" onclick="openCart()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </button>
      <a href="index.html#products" class="btn-nav">Shop Now</a>
    </div>
  </nav>

  <div class="product-page" id="product-page">
    <!-- populated by JS -->
  </div>

  <!-- CART MODAL -->
  <div class="modal-overlay" id="cart-modal" onclick="closeCart()" style="display:none">
    <div class="modal-box cart-modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeCart()">✕</button>
      <h2 style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:20px;color:#2C2318;">Your Cart</h2>
      <div id="cart-body"></div>
      <div id="cart-totals" style="margin-top:16px;"></div>
      <button class="btn-primary" style="width:100%;margin-top:16px;text-align:center;" onclick="goToCheckout()">Proceed to Checkout →</button>
    </div>
  </div>

  <!-- CHECKOUT MODAL -->
  <div class="modal-overlay" id="checkout-modal" onclick="closeCheckout()" style="display:none">
    <div class="modal-box checkout-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeCheckout()">✕</button>
      <h2 style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:6px;color:#2C2318;">Secure Checkout</h2>
      <p style="font-size:13px;color:#9E9383;margin-bottom:20px;">Powered by Stripe — encrypted & secure</p>
      <div class="checkout-payment-methods">
        <button class="pay-method active" onclick="selectPayment(this,'card')">💳 Card</button>
        <button class="pay-method" onclick="selectPayment(this,'paypal')">🅿️ PayPal</button>
        <button class="pay-method" onclick="selectPayment(this,'gpay')">G Pay</button>
        <button class="pay-method" onclick="selectPayment(this,'revolut')">💜 Revolut</button>
      </div>
      <div id="card-section">
        <div id="stripe-card-element" class="stripe-input"></div>
        <p id="stripe-error" style="color:#c0392b;font-size:13px;margin-top:8px;display:none;"></p>
      </div>
      <div style="background:#F5EFE0;border-radius:10px;padding:16px;margin:16px 0;">
        <div style="font-size:13px;color:#6B5B45;margin-bottom:4px;">Order total</div>
        <div style="font-size:24px;font-weight:500;color:#6B5032;" id="checkout-total">$0.00</div>
      </div>
      <div style="margin-bottom:14px;">
        <input class="checkout-input" type="email" placeholder="Email address" id="checkout-email" />
        <input class="checkout-input" type="text" placeholder="Full name" id="checkout-name" />
        <input class="checkout-input" type="text" placeholder="Shipping address" id="checkout-address" />
      </div>
      <button class="btn-primary" style="width:100%;text-align:center;font-size:16px;padding:16px;" onclick="submitPayment()">
        Pay Now — <span id="pay-total">$0.00</span>
      </button>
      <p style="text-align:center;font-size:12px;color:#9E9383;margin-top:12px;">🔒 256-bit SSL encryption. Your data is safe.</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/main.js"></script>
  <script>
    const STRIPE_PK = 'pk_test_REPLACE_WITH_YOUR_KEY';
    let stripe, cardElement, qty = 1;

    function initStripe() {
      stripe = Stripe(STRIPE_PK);
      const elements = stripe.elements();
      cardElement = elements.create('card', {
        style: { base: { fontFamily: "'DM Sans', sans-serif", fontSize: '16px', color: '#3D3020', '::placeholder': { color: '#9E9383' } } }
      });
      cardElement.mount('#stripe-card-element');
    }

    function selectPayment(btn, method) {
      document.querySelectorAll('.pay-method').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('card-section').style.display = method === 'card' ? 'block' : 'none';
    }

    async function submitPayment() {
      const email = document.getElementById('checkout-email').value;
      const name = document.getElementById('checkout-name').value;
      const address = document.getElementById('checkout-address').value;
      if (!email || !name || !address) { showToast('Please fill in all fields.'); return; }
      showToast('Order placed! Thank you 🎉');
      cart = []; saveCart(); updateCartBadge();
      setTimeout(closeCheckout, 500);
    }

    function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));
      const p = products.find(x => x.id === id);
      if (!p) { window.location.href = 'index.html'; return; }

      document.title = p.name + ' — CraftEarth';

      const hasImages = p.images && p.images.length > 0;

      const makeThumb = (src, idx, isEmoji) => `
        <div class="gallery-thumb ${idx === 0 ? 'active' : ''}" onclick="switchImage(this, '${isEmoji ? '' : src}', '${isEmoji ? src : ''}')">
          ${isEmoji ? `<span style="font-size:28px">${src}</span>` : `<img src="${src}" alt="" onerror="this.parentElement.innerHTML='<span style=font-size:28px>${p.emoji}</span>'">`}
        </div>`;

      const thumbsHTML = [p.emoji, p.emoji, p.emoji].map((e, i) => {
        const imgSrc = hasImages ? p.images[i] : null;
        return imgSrc
          ? `<div class="gallery-thumb ${i===0?'active':''}" onclick="switchImage(this, '${imgSrc}', '')">
               <img src="${imgSrc}" alt="" onerror="this.innerHTML='<span style=font-size:28px>${p.emoji}</span>'">
             </div>`
          : `<div class="gallery-thumb ${i===0?'active':''}" onclick="switchImage(this, '', '${p.emoji}')">
               <span style="font-size:28px">${p.emoji}</span>
             </div>`;
      }).join('');

      const mainImgHTML = hasImages
        ? `<img src="${p.images[0]}" id="main-img" alt="${p.name}" onerror="this.outerHTML='<span class=emoji-placeholder>${p.emoji}</span>'">`
        : `<span class="emoji-placeholder">${p.emoji}</span>`;

      document.getElementById('product-page').innerHTML = `
        <div class="breadcrumb">
          <a href="index.html">Home</a> › <a href="index.html#products">Shop</a> › ${p.name}
        </div>
        <div class="product-layout">
          <div class="gallery">
            <div class="gallery-main" id="gallery-main">${mainImgHTML}</div>
            <div class="gallery-thumbs">${thumbsHTML}</div>
          </div>
          <div class="product-info">
            <span class="product-cat">${p.category}</span>
            <h1>${p.name}</h1>
            <div class="rating">
              <span class="stars">★★★★★</span>
              <span>4.8 · 65 reviews</span>
            </div>
            <div class="price-block">
              <div class="price-main">$${p.price.toFixed(2)}</div>
              <div class="shipping-info">
                + $6.00 shipping · <strong>Free shipping on orders over $50</strong>
              </div>
            </div>
            <hr class="divider" />
            <p class="product-desc">${p.desc}</p>
            <ul class="product-details-list">
              ${p.details.map(d => `<li>${d}</li>`).join('')}
            </ul>
            <hr class="divider" />
            <div class="qty-row">
              <span class="qty-label">Quantity</span>
              <div class="qty-control">
                <button onclick="changePageQty(-1)">−</button>
                <span id="page-qty">1</span>
                <button onclick="changePageQty(1)">+</button>
              </div>
            </div>
            <button class="btn-primary add-btn" onclick="addPageToCart(${p.id})">Add to Cart</button>
            <button class="buy-btn" onclick="buyNow(${p.id})">Buy Now</button>
            <div class="trust-badges">
              <span class="trust-badge">🔒 Secure payment</span>
              <span class="trust-badge">📦 Ships in 1–5 days</span>
              <span class="trust-badge">↩️ 30-day returns</span>
            </div>
          </div>
        </div>
      `;
    }

    function switchImage(thumb, imgSrc, emoji) {
      document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
      const main = document.getElementById('gallery-main');
      if (imgSrc) {
        main.innerHTML = `<img src="${imgSrc}" id="main-img" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:16px;">`;
      } else {
        main.innerHTML = `<span class="emoji-placeholder">${emoji}</span>`;
      }
    }

    function changePageQty(delta) {
      qty = Math.max(1, qty + delta);
      document.getElementById('page-qty').textContent = qty;
    }

    function addPageToCart(id) {
      const product = products.find(p => p.id === id);
      const existing = cart.find(c => c.id === id);
      if (existing) { existing.qty += qty; } else { cart.push({ ...product, qty }); }
      saveCart();
      updateCartBadge();
      showToast('Added to cart!');
    }

    function buyNow(id) {
      addPageToCart(id);
      goToCheckout();
      if (!stripe) initStripe();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadCart();
      updateCartBadge();
      loadProduct();
    });
  </script>
</body>
</html>
